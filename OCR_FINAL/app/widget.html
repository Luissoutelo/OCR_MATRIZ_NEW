<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoho CRM - Upload Cartão de Cidadão</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://live.zwidgets.com/js-sdk/1.2/ZohoEmbededAppSDK.min.js"></script>
    
</head>

<body>
    <div class="container-fluid px-3 py-3">
        <header class="mb-4">
            <h1 class="display-6">Leitura de Documento</h1>
            <p class="text-secondary" id="headerSubtitle">Preencha os campos abaixo para processar o seu documento</p>
        </header>

        <section id="view-upload">
            <div class="card shadow-sm">
                <div class="card-body">
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Tipo de Documento *</label>
                        <select class="form-select" id="tipoDocumento">
                            <option value="cc" selected>Cartão de Cidadão</option>
                        </select>
                    </div>

                    <!-- Botões para escolher modo (só no PC) -->
                    <div class="modos-upload" id="modosBotoes">
                        <button type="button" class="btn-modo active" id="btnModoCarregar">
                            📁 Carregar Ficheiros
                        </button>
                        <button type="button" class="btn-modo" id="btnModoCamera">
                            📸 Tirar Foto
                        </button>
                    </div>

                    <!-- Inputs escondidos -->
                    <input type="file" id="fileInput" accept=".jpg,.jpeg,.png" multiple hidden>
                    <input type="file" id="cameraInput" accept="image/*" capture="environment" hidden>

                    <!-- Área de Upload -->
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Upload do Documento *</label>

                        <!-- Upload area personalizada -->
                        <div class="upload-area" id="uploadArea">
                            <div class="upload-placeholder">
                                <div class="mb-3">
                                    <span class="icon">
                                        <svg viewBox="0 0 24 24" width="32" height="32" fill="#6c757d">
                                            <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" />
                                        </svg>
                                    </span>
                                </div>
                                <div class="text-muted mb-2" id="uploadHint">Clique para selecionar ficheiros</div>
                                <div class="small text-muted">JPG, PNG (max. 25 MB) - Frente e Verso</div>
                            </div>
                            <img id="preview-image" class="preview" alt="Preview" style="display: none;">
                        </div>

                        <!-- Lista de ficheiros -->
                        <div id="fileList" class="mt-3"></div>

                        <!-- Mensagens de status -->
                        <div id="statusMessage" class="mt-3 text-center small"></div>

                        <!-- Botão processar -->
                        <div class="d-grid">
                            <button id="btnProcess" class="btn btn-primary btn-lg" type="button" disabled>
                                Ler Dados
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- ===== SEGUNDA PÁGINA: DADOS LIDOS ===== -->
        <section id="view-dados" style="display:none;">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5 class="mb-4 d-flex align-items-center gap-2">
                        <svg viewBox="0 0 24 24" width="22" height="22" fill="#198754"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
                        Dados Lidos
                    </h5>

                    <div id="camposDados"></div>

                    <div id="avisoNIF" class="alert alert-danger mt-3" style="display:none;">
                        ⚠️ Este NIF já existe no Zoho CRM. Não é possível submeter os dados.
                    </div>

                    <div class="form-check mt-4 mb-3">
                        <input class="form-check-input" type="checkbox" id="checkConfirmar">
                        <label class="form-check-label" for="checkConfirmar">
                            Confirmo que os dados estão corretos <span class="text-danger">*</span>
                        </label>
                    </div>

                    <div class="d-flex gap-2">
                        <button id="btnInserir" class="btn btn-success flex-grow-1" disabled>
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="white" class="me-1" style="vertical-align:middle"><path d="M17 3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V7l-4-4zm-5 16a3 3 0 110-6 3 3 0 010 6zm3-10H5V5h10v4z"/></svg>
                            Inserir Dados
                        </button>
                        <button id="btnVoltar" class="btn btn-outline-secondary">
                            Voltar
                        </button>
                    </div>
                </div>
            </div>
        </section>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/verificar_nif.js"></script>
    <script src="js/dados.js"></script>
    <script src="js/script.js"></script>
</body>

</html>
