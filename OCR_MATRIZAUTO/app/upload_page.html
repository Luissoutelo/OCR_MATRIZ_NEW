<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoho CRM - Upload Cartão de Cidadão</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
   
    <div class="container py-4">
        
        <header class="mb-4text-md-finish">
           <h1 class="display-6">Leitura de Documento</h1>
            <p class="text-secondary">Preencha os campos abaixo para processar o seu documento</p>
        </header>

 
        <section id="view-upload">
           
            <div class="card shadow-sm">
                <div class="card-body">
              
                    <div class="row g-3 mb-4">
                        <div class="col-sm-6">
                            <label class="form-label fw-semibold">Tipo de Documento *</label>
                            <select class="form-select" id="tipoDocumento">
                                <option value="cc" selected>Cartão de Cidadão</option>
            
                            </select>
                        </div>
                        
                    </div>

                    <!-- Área de Upload -->
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Upload do Documento *</label>
                        
                        <!-- Upload area personalizada -->
                        <div class="upload-area" id="uploadArea">
                            <!-- Conteúdo padrão (quando não há imagem) -->
                            <div class="upload-placeholder">
                                <div class="mb-3">
                                    <span class="icon">
                                        <svg viewBox="0 0 24 24" width="32" height="32" fill="#6c757d">
                                            <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
                                        </svg>
                                    </span>
                                </div>
                                <div class="text-muted mb-2">Clique para selecionar ficheiros</div>
                                <div class="small text-muted">JPG, PNG (max. 25 MB)</div>
                            </div>
                            
                            <!-- Preview da imagem (inicialmente escondido) -->
                            <img id="preview-image" class="preview" alt="Preview" style="display: none;">
                            
                            <!-- Input file escondido -->
                            <input type="file" id="fileInput" accept=".jpg,.jpeg,.png" multiple>
                        </div>

                        <!-- Lista de ficheiros selecionados -->
                        <div id="fileList" class="mt-3">
                          
                    </div>

                 

                    <!-- Botão processar -->
                    <div class="d-grid">
                        <button id="btnProcess" class="btn btn-primary btn-lg" type="button" >
                            Ler Dados
                        </button>
                    </div>
                    
                    <!-- Status messages -->
                    <div id="statusMessage" class="mt-3 text-center small"></div>
                </div>
            </div>
        </section>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
   
</body>
</html>
